<script>
    const API_URL = "https://script.google.com/macros/s/AKfycbwyZ0JJo1oWUobhaNqTYgn1NuHJM2Rhh7ESIhUCX7ypfyfUH5TiLut684CGHAigWeXR/exec";
    let html5QrcodeScanner = null;

    document.addEventListener("DOMContentLoaded", () => {
        const rolGuardado = localStorage.getItem("rol");
        const nombreGuardado = localStorage.getItem("nombre");
        if (rolGuardado && nombreGuardado) {
            document.getElementById("llenado-operador").value = nombreGuardado;
            construirDashboardPorRol(rolGuardado, nombreGuardado);
        }
    });

    function alternarVisibilidadPassword() {
        const input = document.getElementById("clave");
        input.type = input.type === "password" ? "text" : "password";
    }

    // FUNCIÓN CENTRAL PARA POST (EVITA PREFLIGHT Y ERROR CORS)
    async function enviarServidorPOST(datos) {
        try {
            const response = await fetch(API_URL, {
                method: "POST",
                headers: {
                    "Content-Type": "text/plain;charset=utf-8"
                },
                body: JSON.stringify(datos)
            });

            if (!response.ok) {
                throw new Error(`HTTP Error: ${response.status}`);
            }

            return await response.json();
        } catch (error) {
            console.error("Error al conectar con la API:", error);
            throw new Error("No se pudo conectar con Google Apps Script. Verifique el despliegue.");
        }
    }

    async function login() {
        const usuario = document.getElementById("usuario").value.trim();
        const clave = document.getElementById("clave").value.trim();
        const btn = document.getElementById("btn-login");

        if(!usuario || !clave) return alert("Por favor complete todos los campos.");

        btn.disabled = true;
        btn.innerText = "Cargando...";

        try {
            const datos = await enviarServidorPOST({ action: "login", usuario: usuario, clave: clave });
            if(datos.estado) {
                localStorage.setItem("usuario", datos.usuario); 
                localStorage.setItem("nombre", datos.nombre); 
                localStorage.setItem("rol", datos.rol);
                
                document.getElementById("llenado-operador").value = datos.nombre || datos.usuario;
                construirDashboardPorRol(datos.rol, datos.nombre);
            } else { 
                alert(datos.mensaje || "Usuario o contraseña incorrectos."); 
            }
        } catch (err) {
            alert(err.message);
        } finally {
            btn.disabled = false;
            btn.innerText = "Ingresar al Sistema";
        }
    }

    function construirDashboardPorRol(rol, nombre) {
        document.getElementById("pantalla-login").style.display = "none";
        document.getElementById("pantalla-dashboard").style.display = "block";
        document.getElementById("nombre-usuario").innerText = nombre;
        document.getElementById("badge-rol").innerText = rol.toUpperCase();

        const r = rol.toLowerCase().trim();
        
        document.getElementById("tab-btn-historial").style.display = "none";
        document.getElementById("tab-btn-termos").style.display = "none";
        document.getElementById("tab-btn-llenado").style.display = "none";
        document.getElementById("tab-btn-taller").style.display = "none";
        document.getElementById("tab-btn-logistica").style.display = "none";
        document.getElementById("tab-btn-inspecciones").style.display = "none";

        if (r === "consultor") {
            document.getElementById("tab-btn-historial").style.display = "block";
        } else if (r === "tecnico" || r === "taller" || r === "produccion") {
            document.getElementById("tab-btn-historial").style.display = "block";
            document.getElementById("tab-btn-llenado").style.display = "block";
            document.getElementById("tab-btn-taller").style.display = "block";
            document.getElementById("tab-btn-inspecciones").style.display = "block";
        } else {
            document.getElementById("tab-btn-historial").style.display = "block";
            document.getElementById("tab-btn-termos").style.display = "block";
            document.getElementById("tab-btn-llenado").style.display = "block";
            document.getElementById("tab-btn-taller").style.display = "block";
            document.getElementById("tab-btn-logistica").style.display = "block";
            document.getElementById("tab-btn-inspecciones").style.display = "block";
        }

        cambiarTab('tab-inicio', document.getElementById('tab-btn-inicio'));
    }

    function cambiarTab(idPane, btnEl) {
        document.querySelectorAll('.modulo-pane').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.menu-tab').forEach(t => t.classList.remove('active'));
        document.getElementById(idPane).classList.add('active');
        if(btnEl) btnEl.classList.add('active');
    }

    function alternarEscaner() {
        const zona = document.getElementById("zona-escaneo"); 
        const btn = document.getElementById("btn-control-camara");
        if (html5QrcodeScanner === null) {
            zona.style.display = "block"; 
            btn.innerText = "🛑 Detener Cámara"; 
            btn.style.backgroundColor = "var(--danger)";
            
            html5QrcodeScanner = new Html5Qrcode("zona-escaneo");
            html5QrcodeScanner.start(
                { facingMode: "environment" }, 
                { fps: 15, qrbox: { width: 250, height: 180 } },
                (texto) => {
                    const limpio = texto.trim().substring(0, 16);
                    sincronizarCodigos(limpio); 
                    detenerEscanerEfectivo();
                    solicitarHistorialServidor(limpio);
                },
                () => {}
            ).catch(() => { alert("Active los permisos de cámara en su navegador."); detenerEscanerEfectivo(); });
        } else { 
            detenerEscanerEfectivo(); 
        }
    }

    function detenerEscanerEfectivo() {
        const zona = document.getElementById("zona-escaneo"); 
        const btn = document.getElementById("btn-control-camara");
        if (html5QrcodeScanner) {
            html5QrcodeScanner.stop().then(() => { 
                html5QrcodeScanner = null; 
                zona.style.display = "none"; 
                btn.innerText = "📸 Activar Cámara"; 
                btn.style.backgroundColor = "var(--success)"; 
            }).catch(() => { 
                html5QrcodeScanner = null; 
                zona.style.display = "none"; 
            });
        }
    }

    function sincronizarCodigos(valor) {
        const u = valor.toUpperCase().substring(0, 16);
        document.getElementById("codigo-detectado").value = u;
        document.getElementById("reg-codigo").value = u;
        document.getElementById("llenado-codigo").value = u;
        document.getElementById("taller-codigo").value = u;
        document.getElementById("log-codigo").value = u;
        document.getElementById("insp-codigo").value = u;
    }

    function cargarHistorialDesdeBoton() {
        const cod = document.getElementById("codigo-detectado").value.trim();
        if(!cod) return alert("Por favor inserte o escanee un código de termo.");
        solicitarHistorialServidor(cod);
    }

    async function solicitarHistorialServidor(codigo) {
        document.getElementById("lbl-termo-titulo").innerText = codigo.toUpperCase();
        cambiarTab('tab-historial', document.getElementById('tab-btn-historial'));
        
        try {
            const res = await fetch(`${API_URL}?action=obtenerHistorial&codigo=${encodeURIComponent(codigo)}`).then(r => r.json());
            if(res.estado) {
                document.getElementById("h-cliente-anterior").innerText = res.clienteAnterior || 'N/A';
                document.getElementById("h-cliente-actual").innerText = res.clienteActual || 'N/A';
                document.getElementById("h-total-llenados").innerText = (res.llenados ? res.llenados.length : 0) + " registros";
                document.getElementById("h-ultimo-llenado").innerText = res.ultimoLlenado || 'N/A';
                
                let htmlLlenados = "";
                if(!res.llenados || res.llenados.length === 0) htmlLlenados = "<tr><td colspan='4'>Sin cargas históricas.</td></tr>";
                else res.llenados.slice(0, 10).forEach(l => { htmlLlenados += `<tr><td>${l.fecha}</td><td>${l.presion}</td><td>${l.nivel}</td><td>${l.operador}</td></tr>`; });
                document.getElementById("tabla-llenados").querySelector("tbody").innerHTML = htmlLlenados;

                let htmlTaller = "";
                if(!res.mantenimientos || res.mantenimientos.length === 0) htmlTaller = "<tr><td colspan='5'>Sin reportes de taller.</td></tr>";
                else res.mantenimientos.forEach(m => { htmlTaller += `<tr><td>${m.fecha}</td><td><b>${m.tipo}</b></td><td>${m.descripcion}</td><td>${m.tiempoInvertido}</td><td>${m.estado}</td></tr>`; });
                document.getElementById("tabla-taller").querySelector("tbody").innerHTML = htmlTaller;

                let htmlInsp = "";
                if(!res.inspecciones || res.inspecciones.length === 0) htmlInsp = "<tr><td colspan='3'>Sin inspecciones registradas.</td></tr>";
                else res.inspecciones.forEach(i => { htmlInsp += `<tr><td>${i.fecha}</td><td>${i.presion} PSI</td><td>${i.componentes}</td></tr>`; });
                document.getElementById("tabla-inspecciones").querySelector("tbody").innerHTML = htmlInsp;

                let htmlCustodia = "";
                if(!res.custodia || res.custodia.length === 0) htmlCustodia = "<tr><td colspan='3'>Sin registros de ruta.</td></tr>";
                else res.custodia.forEach(c => { htmlCustodia += `<tr><td>${c.fecha}</td><td>${c.cliente}</td><td>${c.chofer}</td></tr>`; });
                document.getElementById("tabla-custodia").querySelector("tbody").innerHTML = htmlCustodia;
            }
        } catch (e) {
            console.error("Error cargando historial:", e);
        }
    }

    // --- ACCIONES DE FORMULARIOS ALINEADAS CON GOOGLE SHEETS ---

    async function registrarTermo() {
        const payload = {
            action: "guardarTermo",
            codigo: document.getElementById("reg-codigo").value.trim(),
            serie: document.getElementById("reg-serie").value.trim(),
            capacidad: document.getElementById("reg-capacidad").value,
            gas: document.getElementById("reg-gas").value,
            observaciones: document.getElementById("reg-observaciones").value.trim()
        };
        if(!payload.codigo) return alert("Ingrese el código del termo.");
        
        const res = await enviarServidorPOST(payload);
        alert(res.mensaje);
    }

    async function registrarLlenado() {
        const payload = {
            action: "guardarLlenado",
            codigo: document.getElementById("llenado-codigo").value.trim(),
            operador: document.getElementById("llenado-operador").value.trim(),
            producto: document.getElementById("reg-gas") ? document.getElementById("reg-gas").value : "LIN / LOX",
            orcaIni: document.getElementById("llenado-orca-ini").value,
            orcaFin: document.getElementById("llenado-orca-fin").value,
            termoIni: document.getElementById("llenado-termo-ini").value,
            termoFin: document.getElementById("llenado-termo-fin").value,
            pctIni: document.getElementById("llenado-pct-ini").value,
            pctFin: document.getElementById("llenado-pct-fin").value,
            cantidad: document.getElementById("llenado-cantidad").value,
            tiempo: document.getElementById("llenado-tiempo").value,
            observaciones: document.getElementById("llenado-observaciones").value.trim()
        };
        if(!payload.codigo) return alert("Ingrese el código del termo.");

        const res = await enviarServidorPOST(payload);
        alert(res.mensaje);
    }

    async function registrarTaller() {
        const payload = {
            action: "guardarTaller",
            codigo: document.getElementById("taller-codigo").value.trim(),
            tipo: document.getElementById("taller-tipo").value,
            descripcion: document.getElementById("taller-descripcion").value.trim(),
            tiempoInvertido: document.getElementById("taller-tiempo").value.trim(),
            estado: document.getElementById("taller-estado").value,
            tecnico: localStorage.getItem("nombre") || "Técnico"
        };
        if(!payload.codigo) return alert("Ingrese el código del termo.");

        const res = await enviarServidorPOST(payload);
        alert(res.mensaje);
    }

    async function registrarLogistica() {
        const payload = {
            action: "guardarLogistica",
            codigo: document.getElementById("log-codigo").value.trim(),
            cliente: document.getElementById("log-cliente").value.trim(),
            chofer: document.getElementById("log-chofer").value.trim()
        };
        if(!payload.codigo || !payload.cliente) return alert("Complete los datos requeridos.");

        const res = await enviarServidorPOST(payload);
        alert(res.mensaje);
    }

    async function registrarInspeccion() {
        const marcados = Array.from(document.querySelectorAll('.comp-danado:checked')).map(c => c.value);
        const payload = {
            action: "guardarInspeccion",
            codigo: document.getElementById("insp-codigo").value.trim(),
            presion: document.getElementById("insp-presion").value,
            componentes: marcados.join(", ") || "Ninguno"
        };
        if(!payload.codigo) return alert("Ingrese el código del termo.");

        const res = await enviarServidorPOST(payload);
        alert(res.mensaje);
    }

    function cerrarSesion() {
        localStorage.clear();
        window.location.reload();
    }
</script>
